name: Auto Update IBS Special Sports

on:
  schedule:
    - cron: '*/30 * * * *' # প্রতি ৩০ মিনিট পর পর
  workflow_dispatch:        # ম্যানুয়াল রানের জন্য বাটন

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # রাইট পারমিশন

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          ref: 'M3u8' # নির্দিষ্ট ব্রাঞ্চ

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install Dependencies
        run: |
          pip install requests pytz

      - name: Run Sports Scraper
        run: python crichd.py

      - name: Commit and Push Changes
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          
          # ব্রাঞ্চের হিস্ট্রি ঠিক রাখা
          git add "Crichd playlist.m3u" || true
          
          # কমিট করার চেষ্টা (যদি কোনো পরিবর্তন থাকে)
          git commit -m "Crichd Sports Update: $(date)" || echo "No changes to commit, continuing..."
          
          # জোরপূর্বক পুশ করা (Force push)
          git push origin M3u8 --force
          
