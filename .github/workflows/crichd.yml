name: Auto Update Crichd Sports

on:
  schedule:
    - cron: '*/30 * * * *' # প্রতি ৩০ মিনিট পর পর
  workflow_dispatch:        # ম্যানুয়াল রানের জন্য বাটন

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # রাইট পারমিশন

    steps:
      - name: Checkout Main Branch
        uses: actions/checkout@v4
        with:
          ref: 'main'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          pip install requests pytz

      - name: Run Sports Scraper
        run: python crichd.py

      - name: Commit and Push Changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # লেটেস্ট পরিবর্তনগুলো নিয়ে সমন্বয়
          git pull origin main --rebase || true
          
          git add "Crichd playlist.m3u"
          
          # পরিবর্তন চেক করুন: কোনো পরিবর্তন থাকলে কমিট হবে, অন্যথায় স্কিপ করবে
          git diff --staged --quiet || git commit -m "Crichd Sports Update: $(date)"
          
          # সফলভাবে পুশ করার জন্য
          git push origin main --force
          
