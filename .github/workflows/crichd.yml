name: Auto Update IBS Special Sports

on:
  schedule:
    - cron: '*/30 * * * *' # প্রতি ৩০ মিনিট পর পর
  workflow_dispatch:        # ম্যানুয়ালি রান করার জন্য বাটন

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # রাইট পারমিশন

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          ref: 'M3u8' # আপনার নির্দিষ্ট ব্রাঞ্চ

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install Dependencies
        run: |
          pip install requests pytz

      - name: Run Sports Scraper
        run: python crichd.py

      - name: Commit and Push Changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # ফাইল স্টেজিং
          git add "IBS TV special.m3u"
          
          # যদি কোনো পরিবর্তন থাকে তবেই কমিট করবে, অন্যথায় সফলভাবে শেষ হবে
          git diff --quiet && git diff --staged --quiet || git commit -m "Crichd Sports Update: $(date)"
          
          # ফোর্স পুশ করার প্রয়োজন হলে origin M3u8
          git push origin M3u8
          
