name: Auto Update IBS Special Sports

on:
  schedule:
    - cron: '*/30 * * * *' # প্রতি ৩০ মিনিট পর পর
  workflow_dispatch:        # ম্যানুয়াল রানের জন্য বাটন

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # রাইট পারমিশন নিশ্চিত করা

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          ref: 'M3u8' # আপনার নির্দিষ্ট ব্রাঞ্চ

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install Dependencies
        run: |
          pip install requests pytz

      - name: Run Sports Scraper
        run: python crichd.py

      - name: Commit and Push Changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # ব্রাঞ্চ পুল করা যাতে কনফ্লিক্ট না হয়
          git pull origin M3u8 --rebase || true
          
          git add "IBS TV special.m3u"
          
          # যদি নতুন কোনো পরিবর্তন থাকে তবেই কমিট করবে, অন্যথায় স্কিপ করবে
          git diff --quiet && git diff --staged --quiet || git commit -m "Crichd Sports Update: $(date)"
          
          # পরিবর্তন পুশ করা
          git push origin M3u8
          
